name: Deploy website to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write website/config.js from secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          PODCASTS_BUCKET: ${{ secrets.PODCASTS_BUCKET }}
          UPLOADS_BUCKET: ${{ secrets.UPLOADS_BUCKET }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::Repository secrets SUPABASE_URL and SUPABASE_ANON_KEY must be set (Settings → Secrets and variables → Actions)."
            exit 1
          fi
          export PODCASTS_BUCKET="${PODCASTS_BUCKET:-podcasts}"
          export UPLOADS_BUCKET="${UPLOADS_BUCKET:-uploads}"
          node << NODE
          const fs = require('fs');
          const cfg = {
            supabaseUrl: process.env.SUPABASE_URL,
            supabaseAnonKey: process.env.SUPABASE_ANON_KEY,
            podcastsBucket: process.env.PODCASTS_BUCKET,
            uploadsBucket: process.env.UPLOADS_BUCKET,
          };
          const body = '// Generated by GitHub Actions deploy\n' +
            'window.LIL_SEBASTIAN_CONFIG = ' + JSON.stringify(cfg, null, 2) + ';\n';
          fs.writeFileSync('website/config.js', body, 'utf8');
          NODE

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - id: deployment
        uses: actions/deploy-pages@v4
