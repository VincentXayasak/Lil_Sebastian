<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Podcast App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="page-content">

  <div class="app-header">
    <img class="app-logo" src="sebastian.png" width="64" height="64" alt="" />
  </div>

  <!-- Search Bar (always visible) -->
  <div class="search-bar" role="search">
    <input type="text" id="search-input" class="search-input" placeholder="Search podcasts" autocomplete="off" autocorrect="off" autocapitalize="off" aria-label="Search podcasts" spellcheck="false" />
    <button type="button" class="clear-btn" id="clear-btn" aria-label="Clear search" hidden>✕</button>
  </div>

  <!-- HOME VIEW -->
  <div id="home-view">
    <div class="middle-row">
      <button type="button" class="recent-square" id="recent-square-btn" disabled aria-label="Recently played episode">
        <span class="card-label">Recently played</span>
        <span class="recent-title" id="recent-title" hidden></span>
        <span class="card-hint" id="recent-empty-hint">Nothing yet</span>
        <span class="recent-hint" id="recent-hint" hidden>Tap to play</span>
      </button>

      <div class="city-panel">
        <div class="city-label">Subscribed city</div>
        <div class="city-name">Your city</div>
      </div>
    </div>

    <input type="file" id="file-input" accept="video/*" style="display: none;" />

    <button class="upload-block" id="upload-block" aria-label="Upload a podcast episode">
      <div class="upload-text-group">
        <div class="card-label" id="upload-label">Upload episode</div>
        <div class="card-hint" id="upload-hint">Share a podcast to your city</div>
      </div>
    </button>

    <div class="bottom-panel episodes-panel">
      <div class="card-label">Episodes</div>
      <p id="config-hint" class="config-hint" hidden>
        Add <strong>supabaseUrl</strong> and <strong>supabaseAnonKey</strong> to <code>config.js</code> as <code>LIL_SEBASTIAN_CONFIG</code> (same as your Expo <code>.env</code>), then reload.
      </p>
      <div id="episodes-status" class="episodes-status" role="status"></div>
      <div id="episodes-list-real" class="episodes-real-list"></div>
    </div>
  </div>

  <!-- RESULTS VIEW (search; same behavior as app) -->
  <div id="results-view" hidden>
    <div class="results-panel">
      <p class="results-header" id="results-header"></p>
      <p class="card-hint results-hint" id="results-hint" hidden>Try a different keyword.</p>
      <div id="results-list" class="episodes-real-list"></div>
    </div>
  </div>

  <div id="listen-player" class="listen-player" hidden aria-label="Episode player">
    <div class="listen-player-inner">
      <audio id="episode-audio" preload="metadata"></audio>
      <div class="listen-top">
        <div class="listen-title" id="listen-title"></div>
        <button type="button" class="listen-close" id="listen-close" aria-label="Close player">✕</button>
      </div>
      <div class="listen-scrub-row">
        <span class="listen-time" id="listen-time-current">0:00</span>
        <input type="range" id="listen-scrub" min="0" step="any" value="0" aria-label="Seek">
        <span class="listen-time" id="listen-time-duration">0:00</span>
      </div>
      <button type="button" class="listen-play-toggle" id="listen-play-toggle">Play</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.js" crossorigin="anonymous"></script>
  <script src="config.js"></script>
  <script src="app.js" defer></script>
  </div>
</body>
</html>
