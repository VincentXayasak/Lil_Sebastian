<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Podcast App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #BAB8B8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .safe-top { height: 0; }

    /* Navbar */
    .navbar {
      background: #027525;
      border-bottom: 1px solid #025e1e;
      padding: 0 28px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      font-size: 17px;
      font-weight: 700;
      color: #eaf2ed;
      letter-spacing: -0.3px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-logo-img-wrap {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;

    }

    .nav-logo-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    .nav-logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #027525;
    }








    .page-content {
      padding: 20px 20px 24px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    /* Search Bar */
    .search-bar {
      height: 52px;
      border-radius: 14px;
      background: #f2f5f2;
      border: 1px solid #bccac2;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      transition: border-color 0.15s ease;
    }
    .search-bar:focus-within { border-color: #027525; }

    .search-icon-btn {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      color: #7da090;
      flex-shrink: 0;
    }
    .search-icon-btn:hover { color: #027525; }

    .search-input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 16px;
      color: #2e4a3a;
      outline: none;
      font-family: inherit;
    }
    .search-input::placeholder { color: #7da090; }

    .clear-btn {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      color: #7da090;
      display: none;
      align-items: center;
    }
    .clear-btn.visible { display: flex; }
    .clear-btn:hover { color: #2e4a3a; }

    /* Views */
    #home-view, #results-view, #no-results-view {
      display: none;
      flex-direction: column;
      flex: 1;
    }
    #home-view { display: flex; }

    /* Middle Row */
    .middle-row {
      display: flex;
      align-items: stretch;
      margin-top: 20px;
      gap: 14px;
    }

    .recent-square {
      flex: 1;
      border-radius: 16px;
      background: #ffffff;
      border: 1px solid #bccac2;
      padding: 14px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .city-panel {
      flex: 1;
      border-radius: 16px;
      background: #027525;
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: 148px;
    }

    /* Upload Block */
    .upload-block {
      margin-top: 20px;
      border-radius: 16px;
      background: #ffffff;
      border: 1px solid #bccac2;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
      width: 100%;
      text-align: left;
      -webkit-appearance: none;
      appearance: none;
      font-family: inherit;
    }
    .upload-block:hover { background: #f0f0f0; border-color: #bccac2; }
    .upload-block:active { background: #e8eeea; }

    .upload-text-group { display: flex; flex-direction: column; gap: 4px; }

    /* Bottom Panel */
    .bottom-panel {
      margin-top: 20px;
      flex: 1;
      border-radius: 16px;
      background: #ffffff;
      border: 1px solid #bccac2;
      padding: 18px;
      min-height: 160px;
    }

    /* Shared Typography */
    .card-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: #5e8870;
      margin-bottom: 6px;
    }
    .city-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: #82b898;
      margin-bottom: 6px;
    }
    .card-hint { font-size: 13px; color: #4e6e5e; line-height: 1.5; }
    .city-name { font-size: 22px; font-weight: 700; color: #eaf2ed; }

    /* Placeholder art */
    .placeholder-art {
      width: 100%;
      height: 62px;
      background: #e8eeea;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-left: 10px;
    }
    .placeholder-art svg { color: #afc8b8; }

    /* Episode skeletons */
    .episode-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-top: 1px solid #e8eeea;
      margin-top: 12px;
    }
    .ep-thumb {
      width: 42px; height: 42px;
      background: #e8eeea;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .ep-thumb svg { color: #afc8b8; }
    .ep-text { display: flex; flex-direction: column; gap: 5px; }
    .ep-title-bar { width: 140px; height: 11px; background: #dde8e2; border-radius: 4px; }
    .ep-sub-bar { width: 90px; height: 9px; background: #e8eeea; border-radius: 4px; }

    /* Results View */
    .results-header {
      margin-top: 20px;
      margin-bottom: 4px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: #5e8870;
    }

    .result-card {
      background: #ffffff;
      border: 1px solid #bccac2;
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 10px;
    }

    .result-thumb {
      width: 48px; height: 48px;
      border-radius: 10px;
      background: #e8eeea;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .result-thumb svg { color: #7da090; }

    .result-info { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .result-title { font-size: 15px; font-weight: 600; color: #2e4a3a; }
    .result-meta { font-size: 12px; color: #7da090; }

    .result-city {
      font-size: 11px;
      font-weight: 600;
      color: #eaf2ed;
      background: #027525;
      border-radius: 6px;
      padding: 3px 8px;
      white-space: nowrap;
    }

    /* No Results View */
    .no-results-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }

    .no-results-icon {
      width: 72px; height: 72px;
      border-radius: 20px;
      background: #027525;
      border: 1px solid #bccac2;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
    }
    .no-results-icon svg { color: #bccac2; }

    .no-results-title { font-size: 18px; font-weight: 700; color: #2e4a3a; margin-bottom: 8px; }
    .no-results-sub { font-size: 14px; color: #5e8870; line-height: 1.6; }
    .no-results-query { color: #027525; font-weight: 600; }
  </style>
</head>

  <div class="page-content">

  <!-- Search Bar (always visible) -->
  <div class="search-bar" role="search">
    <button class="search-icon-btn" id="search-btn" aria-label="Search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
    <input type="text" id="search-input" class="search-input" placeholder="Search podcasts" autocomplete="off" aria-label="Search podcasts" />
    <button class="clear-btn" id="clear-btn" aria-label="Clear search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- HOME VIEW -->
  <div id="home-view">
    <div class="middle-row">
      <div class="recent-square">
        <div class="placeholder-art" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/><path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
          </svg>
        </div>
        <div class="card-label">Recently listened</div>
        <div class="card-hint">Podcast art / title</div>
      </div>

      <div class="city-panel">
        <div class="city-label">Subscribed city</div>
        <div class="city-name">Your city</div>
      </div>
    </div>

    <input type="file" id="file-input" accept="video/*" style="display: none;" />

    <button class="upload-block" id="upload-block" aria-label="Upload a podcast episode">
      <div class="upload-text-group">
        <div class="card-label" id="upload-label">Upload episode</div>
        <div class="card-hint" id="upload-hint">Share a podcast to your city</div>
      </div>
    </button>

    <div class="bottom-panel">
      <div class="card-label">Recent in your cities</div>
      <div class="card-hint">Episodes from cities you follow will appear here</div>
      <div class="episode-item" aria-hidden="true">
        <div class="ep-thumb">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </div>
        <div class="ep-text"><div class="ep-title-bar"></div><div class="ep-sub-bar"></div></div>
      </div>
      <div class="episode-item" aria-hidden="true">
        <div class="ep-thumb">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </div>
        <div class="ep-text"><div class="ep-title-bar" style="width:110px;"></div><div class="ep-sub-bar" style="width:70px;"></div></div>
      </div>
    </div>
  </div>

  <!-- RESULTS VIEW -->
  <div id="results-view">
    <p class="results-header" id="results-header">Results</p>
    <div id="results-list"></div>
  </div>

  <!-- NO RESULTS VIEW -->
  <div id="no-results-view">
    <div class="no-results-wrap">
      <div class="no-results-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </div>
      <p class="no-results-title">No results found</p>
      <p class="no-results-sub">
        Nothing matched <span class="no-results-query" id="no-results-query"></span>.<br/>
        Try a different keyword or city name.
      </p>
    </div>
  </div>

  <script>
    const PODCASTS = [
      { title: 'The City Pulse',        city: 'New York',      duration: '34 min' },
      { title: 'Street Level',          city: 'Chicago',       duration: '28 min' },
      { title: 'Bay Area Breakdown',    city: 'San Francisco', duration: '41 min' },
      { title: 'Southside Stories',     city: 'Chicago',       duration: '52 min' },
      { title: 'Metro Dispatch',        city: 'Los Angeles',   duration: '19 min' },
      { title: 'The Underground Line',  city: 'New York',      duration: '37 min' },
      { title: 'Cactus and Concrete',   city: 'Phoenix',       duration: '23 min' },
      { title: 'Rainy Day Radio',       city: 'Seattle',       duration: '45 min' },
      { title: 'Deep South Dialogue',   city: 'Atlanta',       duration: '31 min' },
      { title: 'Harbor Talks',          city: 'Boston',        duration: '26 min' },
    ];

    const searchInput   = document.getElementById('search-input');
    const searchBtn     = document.getElementById('search-btn');
    const clearBtn      = document.getElementById('clear-btn');
    const homeView      = document.getElementById('home-view');
    const resultsView   = document.getElementById('results-view');
    const noResultsView = document.getElementById('no-results-view');
    const resultsList   = document.getElementById('results-list');
    const resultsHeader = document.getElementById('results-header');
    const noResultsQuery = document.getElementById('no-results-query');

    function showView(name) {
      homeView.style.display      = name === 'home'       ? 'flex' : 'none';
      resultsView.style.display   = name === 'results'    ? 'flex' : 'none';
      noResultsView.style.display = name === 'no-results' ? 'flex' : 'none';
    }

    function runSearch() {
      const query = searchInput.value.trim();
      if (!query) { showView('home'); return; }

      const matches = PODCASTS.filter(p =>
        p.title.toLowerCase().includes(query.toLowerCase()) ||
        p.city.toLowerCase().includes(query.toLowerCase())
      );

      if (matches.length === 0) {
        noResultsQuery.textContent = '"' + query + '"';
        showView('no-results');
        return;
      }

      resultsHeader.textContent = matches.length + ' result' + (matches.length !== 1 ? 's' : '');
      resultsList.innerHTML = matches.map(p => `
        <div class="result-card">
          <div class="result-thumb">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
              <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/>
              <path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
            </svg>
          </div>
          <div class="result-info">
            <div class="result-title">${p.title}</div>
            <div class="result-meta">${p.duration}</div>
          </div>
          <span class="result-city">${p.city}</span>
        </div>
      `).join('');

      showView('results');
    }

    searchBtn.addEventListener('click', runSearch);
    searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') runSearch(); });
    searchInput.addEventListener('input', () => {
      clearBtn.classList.toggle('visible', searchInput.value.length > 0);
      if (searchInput.value.trim() === '') showView('home');
    });
    clearBtn.addEventListener('click', () => {
      searchInput.value = '';
      clearBtn.classList.remove('visible');
      searchInput.focus();
      showView('home');
    });

    /* Upload */
    const uploadBlock = document.getElementById('upload-block');
    const fileInput   = document.getElementById('file-input');
    const uploadLabel = document.getElementById('upload-label');
    const uploadHint  = document.getElementById('upload-hint');

    uploadBlock.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file) return;
      const mb = (file.size / (1024 * 1024)).toFixed(1);
      uploadLabel.textContent = 'Ready to upload';
      uploadHint.textContent  = file.name + ' · ' + mb + ' MB';
      uploadBlock.style.borderColor = '#027525';
      uploadBlock.style.background  = '#f0faf3';
    });
  </script>
  </div>
